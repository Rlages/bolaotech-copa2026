<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palpites – Bolão Copa 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">⚽ BolãoTech</a>
    <ul class="nav-links">
      <li><a href="index.html">Início</a></li>
      <li><a href="palpites.html" class="ativo">Palpites</a></li>
      <li><a href="placar.html">Placar</a></li>
    </ul>
  </nav>

  <div class="hero hero-compact">
    <h1>Seus Palpites</h1>
    <p>Acerto exato: 3 pts &nbsp;|&nbsp; Acerto vencedor: 1 pt</p>
  </div>

  <main class="section">
    <!-- Se ainda não tem nome cadastrado -->
    <div id="nome-section">
      <h2>Bem-vindo ao Bolão!</h2>
      <p>Digite seu nome para começar a palpitar.</p>
      <div class="input-group">
        <input type="text" id="input-nome" class="input-text"
               placeholder="Seu nome..." maxlength="30"
               onkeydown="if(event.key==='Enter') definirNome()">
        <button class="btn" onclick="definirNome()">Entrar</button>
      </div>
    </div>

    <!-- Info do usuário -->
    <div id="user-info" style="display:none;">
      Jogando como: <strong id="user-nome"></strong>
    </div>

    <!-- Grid de palpites -->
    <div id="palpites-container"></div>
  </main>

  <footer>
    BolãoTech Copa 2026 &copy; 2026
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Show user info bar if already logged in
    document.addEventListener("DOMContentLoaded", () => {
      const user = localStorage.getItem("bolao_user");
      if (user) {
        document.getElementById("user-info").style.display = "flex";
        document.getElementById("palpites-container").style.display = "flex";
      } else {
        document.getElementById("nome-section").style.display = "block";
      }
    });
  </script>
</body>
</html>
